<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload | IServe Facilities</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="site-wrapper">
  <main class="flex-grow">
    <section class="services-page-hero">
      <div class="container text-center">
        <h1>Photo Upload</h1>
        <p>Internal gallery upload + multi-tagging workspace.</p>
      </div>
    </section>

    <section style="padding:3rem 0;background:var(--white)">
      <div class="container-sm">
        <form id="upload-form" class="apply-form">
          <label>Upload photos
            <input id="upload-files" type="file" multiple accept="image/*" />
          </label>
          <fieldset class="upload-tags-fieldset">
            <legend>Apply tags</legend>
            <div id="upload-tag-list"></div>
          </fieldset>
          <div class="upload-actions-row">
            <button id="apply-all-tags-btn" type="button" class="btn btn-primary">Apply All Tags</button>
            <button id="delete-photo-btn" type="button" class="btn btn-secondary">Delete Photo</button>
          </div>
          <button type="submit" class="btn btn-primary">Upload Selected Files</button>
        </form>

        <p id="upload-status" style="margin-top:1rem;color:var(--gray-600)">This page is now wired to a front-end data layer. Real upload/save/delete persistence is the next backend step.</p>

        <div id="upload-photo-list" class="upload-photo-list" style="margin-top:1.5rem"></div>
      </div>
    </section>
  </main>
</div>
<script src="js/gallery-admin.js"></script>
</body>
</html>
