<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply | IServe Facilities</title>
  <meta name="description" content="Apply to work with IServe Facilities." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" href="images/iServeFacLogoSquareTransp.png" />
<script type="text/javascript">
 (function(k) {
 let s=document.createElement('script');s.defer=true;
 s.src="https://cdn.feedbucket.app/assets/feedbucket.js";
 s.dataset.feedbucket=k;document.head.appendChild(s);
 })('IttSUfFL3xYwSF7NmlDx')
</script>
</head>
<body>
<div class="site-wrapper">
<!-- HEADER -->

<main class="flex-grow">
  <section class="services-page-hero">
    <div class="container text-center">
      <h1>Work With Us!</h1>
      <p>Tell us about yourself and upload your resume to apply.</p>
    </div>
  </section>

  <section style="padding:3rem 0;background:var(--white)">
    <div class="container-sm">
      <form id="apply-form" class="apply-form">
        <label>Name*
          <input type="text" name="name" required />
        </label>
        <label>Phone*
          <input type="tel" name="phone" required />
        </label>
        <label>Email*
          <input type="email" name="email" required />
        </label>
        <label>Resume*
          <input type="file" name="resume" accept=".pdf,.doc,.docx" required />
        </label>
        <label>Tell us about yourself*
          <textarea name="about" required placeholder="Help us get to know you — tell us about your experience, work style, strengths, and anything else you want us to know."></textarea>
        </label>
        <button type="submit" class="btn btn-primary" style="justify-content:center">Submit Application</button>
      </form>

      <div id="apply-success" class="apply-success-box" style="display:none">
        <h3>Thank you! We've received your application.</h3>
        <a href="index.html">Go back to the home page</a>
      </div>
    </div>
  </section>
</main>

</div>
<script src="js/main.js"></script>
</body>
</html>
